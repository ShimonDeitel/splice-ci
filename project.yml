name: Splice
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
targets:
  Splice:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Splice
    resources:
      - path: Splice/Configuration.storekit
        optional: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.splice
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIStatusBarHidden: YES
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        INFOPLIST_KEY_CFBundleDisplayName: Splice
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Splice/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
  SpliceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SpliceTests
    dependencies:
      - target: Splice
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.spliceTests
        GENERATE_INFOPLIST_FILE: YES
